    cluster: "your_api_secret"
    supported_voices:
      [
        {
          name: "xiaoyan",
          display_name: "xiaoyan",
          sex: "female",
          description: "iFlytek Mandarin female voice",
          audio_url: "",
        },
        {
          name: "aisjiuxu",
          display_name: "aisjiuxu",
          sex: "male",
          description: "iFlytek Mandarin male voice",
          audio_url: "",
        },
      ]

LLM:
  ChatGLMLLM:
    # Define the LLM API type
    type: openai
    # glm-4-flash is free, but you still need to register and provide an api_key
    # You can find your api key here: https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_api_key
  OllamaLLM:
    # Define the LLM API type
    type: ollama
    model_name: qwen3 # Model name to use; download it in advance with `ollama pull`
    url: http://localhost:11434 # Ollama service address
  DoubaoLLM:
    # Define the LLM API type
    type: doubao
    # doubao-seed-1.6-251015 is Doubao's deep-thinking model; deepseek-v3-1-terminus performs quite well
    # You can find your api key here: https://console.volcengine.com/ark
    model_name: doubao-seed-1.6-251015
    url: https://ark.cn-beijing.volces.com/api/v3
    api_key: your_api_key
    thinking: disabled # Thinking mode: disabled (off) or enabled (on)
    max_tokens: 4000
  CozeLLM:
    # Define the LLM API type
    type: coze
    bot_id: your_bot_id
    user_id: your_user_id
    # Production environment
    # You can create an OAuth service app here to obtain client_id, public_key, private_key: https://www.coze.cn/open/oauth/apps
    client_id: your_coze_client_id
    public_key: your_coze_public_key
    private_key: your_coze_private_key
    # For personal testing; if you filled in client_id/public_key/private_key, you can leave this empty
    # You can find your personal_access_token here: https://www.coze.cn/open/oauth/pats
    personal_access_token: your_coze_personal_access_token
    url: "https://api.coze.cn" # Coze service address

# Exit commands
CMD_exit:
  - "exit"
  - "close"

# VLLLM configuration (Vision-Language Large Model)
VLLLM:
  ChatGLMVLLM:
    type: openai
    model_name: glm-4v-flash # Zhipu AI's vision model
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_api_key
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
    security: # Image security configuration
      max_file_size: 10485760 # 10MB
      max_pixels: 16777216 # 16M pixels
      max_width: 4096
      max_height: 4096
      allowed_formats: ["jpeg", "jpg", "png", "webp", "gif"]
      enable_deep_scan: true
      validation_timeout: 10s
  OllamaVLLM:
    type: ollama
    model_name: qwen2.5vl # Local vision model
    url: http://localhost:11434
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9
    security: # Image security configuration
      max_file_size: 10485760 # 10MB
      max_pixels: 16777216 # 16M pixels
      max_width: 4096
      max_height: 4096
      allowed_formats: ["jpeg", "jpg", "png", "webp", "gif"]
      enable_deep_scan: true
      validation_timeout: 10s

# Connection pool configuration
pool_config:
  pool_min_size: 5
  pool_max_size: 20
  pool_refill_size: 3
  pool_check_interval: 30
mcp_pool_config:
  pool_min_size: 5
  pool_max_size: 20
  pool_refill_size: 3
  pool_check_interval: 30
