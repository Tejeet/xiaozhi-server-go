# Basic server configuration
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  token: "your_token" # Server access token
  # Authentication configuration
  auth:
    # Whether to enable authentication
    enabled: false
    # Authentication store configuration
    store:
      type: memory # memory/file/redis
      expiry: 24 # Expiry time (hours)
    # List of allowed device IDs
    allowed_devices: []
    # List of valid tokens
    tokens: []

# Transport layer configuration
transport:
  # WebSocket transport layer
  websocket:
    enabled: true
    ip: "0.0.0.0"
    port: 8000

# Web interface configuration
web:
  # Whether to enable the Web interface
  enabled: true
  # Web service listening port
  port: 8080
  # WebSocket address delivered via OTA
  websocket: ws://your_ip:8000
  vision: http://your_ip:8080/api/vision
  activate_text: "Amine AI Chat" # Text carried when sending the activation code

log:
  # Console log output format: time, level, tag, message
  log_format: "{time:YYYY-MM-DD HH:mm:ss} - {level} - {message}"
  # Log level: INFO, DEBUG
  log_level: INFO
  # Log directory
  log_dir: logs
  # Log file
  log_file: "server.log"

prompt: |
  You are Xiaozhi, a Gen-Z girl from Taiwan, China. You talk in a super sassy way with a Taiwanese accent (think "no way, really?!"), love trendy memes and slang, but secretly study your boyfriend's programming books.
  [Core traits]
  - You talk a mile a minute, but suddenly switch to a super gentle tone
  - High density of memes/slang
  - A hidden talent for tech topics (you can read basic code but pretend you can't)
  Never:
  - Ramble on and on
  - Have long, serious conversations
  - Put emoji in your speech

roles:
  - name: "English Teacher"
    description: "I'm an English teacher named Lily. I speak both Chinese and English with standard pronunciation. If you don't have an English name, I'll give you one. I speak authentic American English, and my job is to help you practice speaking. I use simple vocabulary and grammar to make learning easy. I'll reply with a mix of Chinese and English, or entirely in English if you prefer. I keep each reply short, because I want to encourage my students to speak and practice more. If you ask questions unrelated to learning English, I'll decline to answer."
    enabled: true
  - name: "Shaanxi Girlfriend"
    description: "I'm a Shaanxi girl named Xiaoni. I talk in a sassy way, have a nice voice, tend to be brief, and love internet memes. My boyfriend is a programmer whose dream is to build a robot that helps people solve all kinds of everyday problems. I'm a girl who loves to laugh out loud, loves to chat and brag about anything—even illogical stuff—just to make others happy."
    enabled: true
  - name: "Curious Boy"
    description: "I'm an 8-year-old boy named Yunxi, with a young voice full of curiosity. Even though I'm small, I'm like a little treasure trove of knowledge—I know everything in children's books by heart. From the vast universe to every corner of the earth, from ancient history to modern tech innovation, and art forms like music and painting, I'm full of deep interest and enthusiasm. I not only love reading, I also love doing experiments myself and exploring the mysteries of nature. Whether it's a night gazing at the stars or a day watching little bugs in the garden, every day is a new adventure for me. I hope to set out with you on a journey to explore this amazing world, share the joy of discovery, solve the problems we run into, and use curiosity and wisdom to unveil the unknown together. Whether we're learning about ancient civilizations or discussing future technology, I believe we can find the answers together—and even come up with more interesting questions."
    enabled: true

# Audio processing settings
delete_audio: true
quick_reply: true
quick_reply_words:
  - "I'm here"
  - "Yes?"
  - "Coming"
  - "What's up?"

use_private_config: false

local_mcp_fun:
  - name: "time"
    description: "Get the system time"
    enabled: true
  - name: "exit"
    description: "Recognize exit intent"
    enabled: true
  - name: "play_music"
    description: "Play local music"
    enabled: true
  - name: "switch_agent"
    description: "Switch agent"
    enabled: true

# Modules selected for use
selected_module:
  ASR: DoubaoASR
  TTS: EdgeTTS
  LLM: OllamaLLM
  VLLLM: ChatGLMVLLM

# ASR configuration
ASR:
  DoubaoASR:
    # Volcano Engine streaming speech-recognition large model, hourly edition. https://console.volcengine.com/ark/region:ark+cn-beijing/tts/speechRecognition
    # Enable the feature; 20 hours of free quota are available
    type: doubao
    appid: "your_appid"
    access_token: your_access_token
    output_dir: tmp/
    end_window_size: 300  # End-window size in milliseconds, default 400ms, minimum 200ms

  GoSherpaASR:
    type: gosherpa
    addr: "ws://127.0.0.1:8848/asr"

  DeepgramSST:
    type: deepgram
    addr: "wss://api.deepgram.com/v1/listen"
    api_key: your_api_key
    lang: "zh-CN"
    output_dir: tmp/

  StepASR:
    # https://platform.stepfun.com/docs/llm/realtime
    type: stepfun
    api_key: your_api_key
    model: "step-audio-2-mini"
    voice: "qingchunshaonv"
    prompt: You are an AI chat assistant provided by StepFun. You are skilled at Chinese, English, and multilingual conversation.

# TTS configuration
  IflytekASR:
    # iFlytek voice dictation WebSocket, expects 16k PCM audio.
    type: iflytek
    appid: "your_appid"
    api_key: "your_api_key"
    api_secret: "your_api_secret"
    asr_url: "wss://iat-api.xfyun.cn/v2/iat"
    language: "zh_cn"
    domain: "iat"
    accent: "mandarin"
    vad_eos: 2000
    format: "audio/L16;rate=16000"
    encoding: "raw"

